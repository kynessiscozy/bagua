<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>天机 · 东方人生决策系统</title>
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<div class="mesh"></div>
<canvas class="particles" id="tjParticles"></canvas>
<div class="cursor-ring" id="tjCursorRing"></div>
<div class="cursor-dot" id="tjCursorDot"></div>

<div class="ld-ov" id="ldov">
  <div class="ld-sp"></div>
  <div class="ld-t">天机推演中</div>
  <div class="ld-br"><div class="ld-bf" id="ldbf"></div></div>
  <div class="ld-st" id="ldst">排列四柱…</div>
</div>

<div class="page" id="page1">
  <div class="p1-scroll">
    <div class="p1-inner">
      <div class="home-card anim-in d1" id="formCard">
        <div class="form-grid">
          <div class="fd"><label>出生日期</label><input type="date" id="bDate" value="1990-06-15"></div>
          <div class="fd"><label>出生时间</label><input type="time" id="bTime" value="09:00" style="font-family:var(--sf)"></div>
          <div class="fd"><label>出生地点</label><div class="cw"><input type="text" id="cInp" placeholder="搜索城市…" autocomplete="off" value="上海"><input type="hidden" id="bPlace" value="shanghai"><div class="cdd" id="cDD"></div></div></div>
          <div class="fd"><label>性别</label><select id="bGen"><option value="male">男（乾造）</option><option value="female">女（坤造）</option></select></div>
          <div class="fd full">
            <label>你现在最想解决什么？</label>
            <div class="chip-wrap" id="qChips">
              <div class="chip" data-q="事业方向" onclick="selChip(this)">事业方向</div>
              <div class="chip" data-q="财运提升" onclick="selChip(this)">财运提升</div>
              <div class="chip" data-q="感情关系" onclick="selChip(this)">感情关系</div>
              <div class="chip" data-q="跳槽创业" onclick="selChip(this)">跳槽创业</div>
              <div class="chip" data-q="健康状态" onclick="selChip(this)">健康状态</div>
              <div class="chip" data-q="人生迷茫" onclick="selChip(this)">人生迷茫</div>
            </div>
            <input type="hidden" id="bQ" value="">
          </div>
        </div>
        <div class="switch-row" style="margin-top:6px"><div class="switch" id="swTrueSolar" onclick="this.classList.toggle('on');document.getElementById('swText').textContent=(this.classList.contains('on')?'开启':'关闭')+'真太阳时（按出生地经度精确换算时辰）'"></div><span id="swText">关闭真太阳时（按出生地经度精确换算时辰）</span></div>
        <div class="cta-row">
          <button class="cta" id="btnGo2" onclick="calc()">开始推演</button>
        </div>
      </div>
      <div id="recentZone" style="margin-bottom:24px;display:none">
        <div class="recent-hd">
          <div class="recent-hd-title">最近推演</div>
        </div>
        <div class="recent-grid" id="recentGrid"></div>
      </div>

      <div id="profileZone" style="margin-bottom:24px;display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:.78em;color:rgba(255,245,220,0.35);letter-spacing:1px">命盘档案</div>
          <div style="display:flex;gap:8px">
            <button onclick="exportProfiles()" style="padding:5px 12px;border-radius:100px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);font-size:.72em;font-family:var(--sf);cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">导出</button>
            <button onclick="document.getElementById('impFile').click()" style="padding:5px 12px;border-radius:100px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);font-size:.72em;font-family:var(--sf);cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">导入</button>
            <input type="file" id="impFile" style="display:none" accept=".json" onchange="handleImport(this)">
          </div>
        </div>
        <div id="profileGrid" class="recent-grid"></div>
        <div id="profileEmpty" class="pf-empty" style="display:none;color:rgba(255,255,255,0.25);font-size:.78em;text-align:center;padding:14px 0">暂无档案，推算后点击「保存」即可收藏命盘</div>
      </div>

      <div class="anim-in d2" style="text-align:center;padding:20px 0 8px">
        <p style="color:rgba(255,255,255,0.14);font-size:.6em;letter-spacing:4px">天 · 机 · 八 · 字 · 决 · 策</p>
      </div>
    </div>
  </div>
</div>

<div class="page hidden" id="page2">
  <div class="p2-top">
    <button class="p2-back" onclick="goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </button>
    <div class="p2-title" id="p2Title">命理报告</div>
    <div class="p2-actions"><div class="p2-act" id="densityToggle" onclick="toggleDensity()" title="切换信息密度"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:block"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
      <div class="p2-act" onclick="copyReport()" title="复制报告"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></div>
      <div class="p2-act" onclick="openSaveModal()" title="保存档案">💾</div>
      <div class="p2-act" onclick="window.print()" title="打印"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></div>
    </div>
  </div>
  <div class="p2-scroll" id="p2Scroll"><button class="back-to-top" id="backToTop" onclick="document.getElementById('p2Scroll').scrollTo({top:0,behavior:'smooth'})"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></button>
    <div class="p2-inner" id="p2Inner"></div>
  </div>
</div>

<div class="tab-bar" id="tabBar">
  <div class="tab-bar-inner">
    <div class="tab-item" data-sec="s-ming" onclick="switchTab(this)">命盘</div>
    <div class="tab-item" data-sec="s-yun" onclick="switchTab(this)">运势</div>
    <div class="ai-dock-btn" onclick="openAsk()" title="AI问">AI问</div>
    <div class="tab-item" data-sec="s-rel" onclick="switchTab(this)">关系</div>
    <div class="tab-item" data-sec="s-adv" onclick="switchTab(this)">建议</div>
  </div>
</div>

<div class="ai-overlay" id="aiOverlay" onclick="closeAsk()"></div>
<div class="ai-sheet" id="aiSheet">
  <button class="ai-config-toggle" onclick="toggleAIConfig()" title="AI设置">?</button>
  <div class="ai-close" onclick="closeAsk()">×</div>
  <div class="ai-handle"></div>
  <div class="ai-title">AI问</div>
  <div class="ai-config" id="aiConfig">
    <div class="ai-config-grid">
      <div>
        <label>服务类型</label>
        <select id="aiProvider">
          <option value="openai">OpenAI 兼容</option>
          <option value="anthropic">Anthropic 兼容</option>
        </select>
      </div>
      <div>
        <label>模型</label>
        <input id="aiModel" placeholder="gpt-4.1-mini">
      </div>
      <div class="full">
        <label>API Key</label>
        <input id="aiKey" type="password" placeholder="仅保存在本机浏览器">
      </div>
      <div class="full">
        <label>Base URL</label>
        <input id="aiBaseUrl" placeholder="https://api.openai.com/v1">
      </div>
    </div>
    <div class="ai-config-actions">
      <button onclick="saveAIConfig()">保存设置</button>
      <button onclick="clearAIConfig()">清除</button>
      <div class="ai-config-hint" id="aiConfigHint">未配置时使用本地智能解读。</div>
    </div>
  </div>
  <!-- 一级：意图分类 -->
  <div class="ai-cats" id="aiCats">
    <div class="ai-cat active" data-cat="hot" onclick="aiSwitchCat(this)">🔥 热门</div>
    <div class="ai-cat" data-cat="事业" onclick="aiSwitchCat(this)">💼 事业</div>
    <div class="ai-cat" data-cat="财富" onclick="aiSwitchCat(this)">💰 财富</div>
    <div class="ai-cat" data-cat="感情" onclick="aiSwitchCat(this)">💗 感情</div>
    <div class="ai-cat" data-cat="健康" onclick="aiSwitchCat(this)">⚕ 健康</div>
    <div class="ai-cat" data-cat="学业" onclick="aiSwitchCat(this)">📚 学业</div>
    <div class="ai-cat" data-cat="居住" onclick="aiSwitchCat(this)">🏠 居住</div>
    <div class="ai-cat" data-cat="玄学" onclick="aiSwitchCat(this)">✦ 术语</div>
  </div>
  <!-- 二级：当前分类下的快捷问题 -->
  <div class="ai-chips" id="aiChips"></div>
  <!-- 搜索框 + 实时联想 -->
  <div class="ai-input-row">
    <div class="ai-input-wrap">
      <input type="text" class="ai-input" id="askInput" placeholder="输入问题或术语，如「桃花运」「考研」…" autocomplete="off">
      <div class="ai-suggest" id="aiSuggest"></div>
    </div>
    <button class="ai-send" onclick="doAskCustom()" title="发送"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
  </div>
  <div class="ai-body" id="askResult"></div>
</div>

<div class="modal" id="saveModal">
  <div class="modal-bg" onclick="closeSaveModal()"></div>
  <div class="modal-sheet glass" style="text-align:center">
    <div class="modal-close" onclick="closeSaveModal()">×</div>
    <div class="modal-title">保存命盘档案</div>
    <input type="text" id="saveName" style="width:100%;padding:12px 16px;border-radius:100px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-family:var(--sf);font-size:.9em;margin:12px 0;text-align:center" placeholder="输入档案名称…" maxlength="20" autocomplete="off">
    <button class="cta" style="padding:12px 32px;font-size:.9em" onclick="confirmSaveProfile()">保存</button>
  </div>
</div>

<div class="modal" id="rqModal">
  <div class="modal-bg" onclick="closeRq()"></div>
  <div class="modal-sheet glass">
    <div class="modal-close" onclick="closeRq()">×</div>
    <div class="modal-title">今日日签</div>
    <div id="rqResult" style="font-size:.85em;line-height:1.9;color:rgba(255,245,220,0.75);padding-top:8px"></div>
  </div>
</div>


<script type="module" src="/src/main.js"></script>
</body>
</html>
