<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>天机 · 东方人生决策系统</title>
<link rel="stylesheet" href="/src/style.css">
</head>
<body class="home">
<div class="mesh"></div>
<canvas class="particles" id="particles"></canvas>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="page" id="page1">
  <div class="p1-scroll">
    <div class="p1-inner">
      <div class="home-card anim-in d1" id="heroCard">
        <div style="text-align:center;padding:8px 0 4px">
          <div style="font-size:.65em;color:var(--ac-dim);letter-spacing:3px;font-weight:500;margin-bottom:10px;text-transform:uppercase" class="anim-in d2">TIANJI</div>
          <h1 style="font-size:2.1em;font-weight:700;letter-spacing:6px;background:linear-gradient(135deg,var(--accent),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.3" class="anim-in d3">天机</h1>
          <div style="font-size:.72em;color:rgba(255,255,255,0.38);letter-spacing:4px;margin-top:6px" class="anim-in d4">东方人生决策系统</div>
        </div>
        <div style="margin-top:18px">
          <div class="chip-wrap anim-in d4">
            <div class="chip active">🎋 八字命盘</div>
            <div class="chip">🔮 运势推演</div>
            <div class="chip">⚡ AI 智能</div>
          </div>
        </div>
      </div>
      <div class="card-2 anim-in d3" id="formCard">
        <div style="font-size:.85em;color:rgba(255,245,220,0.5);letter-spacing:1px;text-align:center;margin-bottom:14px">请填写您的出生信息</div>
        <div class="form-grid">
          <div class="fd">
            <label>性别</label>
            <select id="gender">
              <option value="male" selected>男</option>
              <option value="female">女</option>
            </select>
          </div>
          <div class="fd">
            <label>出生年</label>
            <input type="number" id="birthYear" placeholder="如 1990" min="1900" max="2100">
          </div>
          <div class="fd">
            <label>出生月</label>
            <input type="number" id="birthMonth" placeholder="1-12" min="1" max="12">
          </div>
          <div class="fd">
            <label>出生日</label>
            <input type="number" id="birthDay" placeholder="1-31" min="1" max="31">
          </div>
          <div class="fd">
            <label>出生时</label>
            <select id="birthHour">
              <option value="23" selected>子时 (23-1)</option>
              <option value="0">子时 (0-1)</option>
              <option value="1">丑时 (1-3)</option>
              <option value="2">丑时 (2-3)</option>
              <option value="3">寅时 (3-5)</option>
              <option value="4">寅时 (4-5)</option>
              <option value="5">卯时 (5-7)</option>
              <option value="6">卯时 (6-7)</option>
              <option value="7">辰时 (7-9)</option>
              <option value="8">辰时 (8-9)</option>
              <option value="9">巳时 (9-11)</option>
              <option value="10">巳时 (10-11)</option>
              <option value="11">午时 (11-13)</option>
              <option value="12">午时 (12-13)</option>
              <option value="13">未时 (13-15)</option>
              <option value="14">未时 (14-15)</option>
              <option value="15">申时 (15-17)</option>
              <option value="16">申时 (16-17)</option>
              <option value="17">酉时 (17-19)</option>
              <option value="18">酉时 (18-19)</option>
              <option value="19">戌时 (19-21)</option>
              <option value="20">戌时 (20-21)</option>
              <option value="21">亥时 (21-23)</option>
              <option value="22">亥时 (22-23)</option>
            </select>
          </div>
          <div class="fd">
            <label>出生地</label>
            <select id="birthPlace">
              <option value="北京" selected>北京</option>
              <option value="天津">天津</option>
              <option value="河北">河北</option>
              <option value="山西">山西</option>
              <option value="内蒙古">内蒙古</option>
              <option value="辽宁">辽宁</option>
              <option value="吉林">吉林</option>
              <option value="黑龙江">黑龙江</option>
              <option value="上海">上海</option>
              <option value="江苏">江苏</option>
              <option value="浙江">浙江</option>
              <option value="安徽">安徽</option>
              <option value="福建">福建</option>
              <option value="江西">江西</option>
              <option value="山东">山东</option>
              <option value="河南">河南</option>
              <option value="湖北">湖北</option>
              <option value="湖南">湖南</option>
              <option value="广东">广东</option>
              <option value="广西">广西</option>
              <option value="海南">海南</option>
              <option value="重庆">重庆</option>
              <option value="四川">四川</option>
              <option value="贵州">贵州</option>
              <option value="云南">云南</option>
              <option value="西藏">西藏</option>
              <option value="陕西">陕西</option>
              <option value="甘肃">甘肃</option>
              <option value="青海">青海</option>
              <option value="宁夏">宁夏</option>
              <option value="新疆">新疆</option>
              <option value="台湾">台湾</option>
              <option value="香港">香港</option>
              <option value="澳门">澳门</option>
            </select>
          </div>
        </div>
        <div class="cta-row">
          <button class="cta" id="calcBtn" onclick="calculate()">开启天机</button>
        </div>
      </div>
      <div class="anim-in d5" id="recentZone" style="display:none">
        <div class="recent-hd">
          <span class="recent-hd-title">最近推演</span>
        </div>
        <div class="recent-grid" id="recentList"></div>
      </div>
      <div class="anim-in d5" id="profileZone" style="display:none">
        <div class="recent-hd">
          <span class="recent-hd-title">我的命盘</span>
          <button class="p2-back" onclick="clearProfile()" style="font-size:.68em;padding:4px 10px">清除</button>
        </div>
        <div class="recent-grid" id="profileList"></div>
      </div>
    </div>
  </div>
</div>

<div class="page hidden" id="page2">
  <div class="p2-top">
    <button class="p2-back" onclick="goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </button>
    <div class="p2-title" id="p2Title">命盘详情</div>
    <div class="p2-actions">
      <button class="p2-act" id="densityToggle" onclick="toggleDensity()" title="密度切换">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
      <button class="p2-act" id="rqBtn" onclick="showRQ()" title="日签">签</button>
      <button class="p2-act" onclick="saveProfile()">💾</button>
    </div>
  </div>
  <div class="p2-scroll" id="p2Scroll"><button class="back-to-top" id="backToTop" onclick="document.getElementById('p2Scroll').scrollTo({top:0,behavior:'smooth'})"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></button>
    <div class="p2-inner" id="p2Inner"></div>
  </div>
</div>

<div class="tab-bar" id="tabBar">
  <div class="tab-bar-inner">
    <div class="tab-item active" data-sec="s-ming" onclick="switchTab(this)">命盘</div>
    <div class="tab-item" data-sec="s-yun" onclick="switchTab(this)">运势</div>
    <div class="tab-item" data-sec="s-rel" onclick="switchTab(this)">关系</div>
    <div class="tab-item" data-sec="s-adv" onclick="switchTab(this)">建议</div>
  </div>
</div>
<div class="ai-dock" id="aiDock">
  <div class="ai-dock-btn" onclick="openAsk()" title="AI问">AI问</div>
</div>

<div class="ai-overlay" id="aiOverlay" onclick="closeAsk()"></div>
<div class="ai-sheet" id="aiSheet">
  <button class="ai-config-toggle" onclick="toggleAIConfig()" title="AI设置">?</button>
  <div class="ai-close" onclick="closeAsk()">×</div>
  <div class="ai-handle"></div>
  <div class="ai-title">AI问</div>
  <div class="ai-config" id="aiConfig">
    <div class="ai-config-grid">
      <div>
        <label>服务类型</label>
        <select id="aiProvider">
          <option value="openai">OpenAI 兼容</option>
          <option value="anthropic">Anthropic 兼容</option>
        </select>
      </div>
      <div>
        <label>模型</label>
        <input id="aiModel" placeholder="gpt-4.1-mini">
      </div>
      <div class="full">
        <label>API Key</label>
        <input id="aiKey" type="password" placeholder="仅保存在本机浏览器">
      </div>
      <div class="full">
        <label>Base URL</label>
        <input id="aiBaseUrl" placeholder="https://api.openai.com/v1">
      </div>
    </div>
    <div class="ai-config-actions">
      <button onclick="saveAIConfig()">保存设置</button>
      <button onclick="clearAIConfig()">清除</button>
      <div class="ai-config-hint" id="aiConfigHint">未配置时使用本地智能解读。</div>
    </div>
  </div>
  <div class="ai-cats" id="aiCats">
    <div class="ai-cat active" data-cat="hot" onclick="aiSwitchCat(this)">🔥 热门</div>
    <div class="ai-cat" data-cat="事业" onclick="aiSwitchCat(this)">💼 事业</div>
    <div class="ai-cat" data-cat="财富" onclick="aiSwitchCat(this)">💰 财富</div>
    <div class="ai-cat" data-cat="感情" onclick="aiSwitchCat(this)">💗 感情</div>
    <div class="ai-cat" data-cat="健康" onclick="aiSwitchCat(this)">⚕ 健康</div>
    <div class="ai-cat" data-cat="学业" onclick="aiSwitchCat(this)">📚 学业</div>
    <div class="ai-cat" data-cat="居住" onclick="aiSwitchCat(this)">🏠 居住</div>
    <div class="ai-cat" data-cat="玄学" onclick="aiSwitchCat(this)">✦ 术语</div>
  </div>
  <div class="ai-chips" id="aiChips"></div>
  <div class="ai-input-row">
    <div class="ai-input-wrap">
      <input type="text" class="ai-input" id="askInput" placeholder="输入问题或术语，如「桃花运」「考研」…" autocomplete="off">
      <div class="ai-suggest" id="aiSuggest"></div>
    </div>
    <button class="ai-send" onclick="doAskCustom()" title="发送"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
  </div>
  <div class="ai-body" id="askResult"></div>
</div>

<div class="modal" id="saveModal">
  <div class="modal-bg" onclick="closeSaveModal()"></div>
  <div class="modal-sheet glass" style="text-align:center">
    <div class="modal-close" onclick="closeSaveModal()">×</div>
    <div class="modal-title">保存命盘档案</div>
    <input type="text" id="saveName" style="width:100%;padding:12px 16px;border-radius:100px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-family:var(--sf);font-size:.9em;margin:12px 0;text-align:center" placeholder="输入档案名称…" maxlength="20" autocomplete="off">
    <button class="cta" style="padding:12px 32px;font-size:.9em" onclick="confirmSaveProfile()">保存</button>
  </div>
</div>

<div class="modal" id="rqModal">
  <div class="modal-bg" onclick="closeRq()"></div>
  <div class="modal-sheet glass">
    <div class="modal-close" onclick="closeRq()">×</div>
    <div class="modal-title">今日日签</div>
    <div id="rqResult" style="font-size:.85em;line-height:1.9;color:rgba(255,245,220,0.75);padding-top:8px"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
